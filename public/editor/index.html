<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebEngine: Editor</title>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --border: #3a3a3a; --text: #d4d4d4; --hover: #2f2f2f; --active: #37373d; --folder: #9cdcfe; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: monospace; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #menubar { height: 35px; background: #2d2d2d; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 5px; z-index: 100; }
        .menu { position: relative; }
        .menu-btn { background: none; border: none; color: var(--text); padding: 5px 10px; cursor: pointer; font-family: inherit; }
        .menu-btn:hover, .menu.open .menu-btn { background: var(--hover); }
        .dropdown { position: absolute; top: 100%; left: 0; background: var(--panel); border: 1px solid var(--border); min-width: 180px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .menu.open .dropdown { display: block; }
        .menu-item { width: 100%; text-align: left; background: none; border: none; color: var(--text); padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #333; font-family: inherit; }
        .menu-item:hover { background: var(--hover); }

        #workspace { display: flex; flex: 1; min-height: 0; }
        #sidebar { width: 240px; border-right: 1px solid var(--border); background: var(--panel); overflow-y: auto; }
        #main { flex: 1; display: flex; flex-direction: column; }
        
        /* Updated for CodeMirror */
        #editor-container { flex: 1; overflow: hidden; background: var(--bg); }
        .cm-editor { height: 100% !important; }
        
        #console { height: 180px; background: #000; border-top: 1px solid var(--border); overflow-y: auto; padding: 10px; font-size: 12px; font-family: 'Consolas', monospace; }
        .file-item { padding: 4px 8px; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .file-item:hover { background: var(--hover); }
        .file-item.active { background: var(--active); border-left: 2px solid #007acc; }
        
        #ctx { position: fixed; background: var(--panel); border: 1px solid var(--border); display: none; z-index: 1000; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="menubar">
    <div class="menu">
        <button class="menu-btn">File</button>
        <div class="dropdown">
            <button class="menu-item" data-action="new-file">New File</button>
            <button class="menu-item" data-action="new-folder">New Folder</button>
            <button class="menu-item" data-action="save-file">Save (Ctrl+S)</button>
            <button class="menu-item" data-action="import-project">Import Project</button>
            <button class="menu-item" data-action="export-project">Export Project</button>
        </div>
    </div>
    <div class="menu">
        <button class="menu-btn">Project</button>
        <div class="dropdown">
            <button class="menu-item" data-action="upload-files">Upload Media</button>
            <button class="menu-item" data-action="refresh">Refresh Files</button>
        </div>
    </div>
    <button class="menu-btn" data-action="run-project" style="color: #4ec9b0; font-weight: bold; margin-left: 10px; border: 1px solid #4ec9b033; border-radius: 3px;">▶ Run</button>
    <div style="margin-left: auto; padding-right: 10px; opacity: 0.5; font-size: 11px;" id="path-label">No file selected</div>
</div>

<div id="workspace">
    <div id="sidebar"></div>
    <div id="main">
        <div id="editor-container"></div>
        <div id="console">WebEngine Ready.</div>
    </div>
</div>

<div id="ctx">
    <button class="menu-item" data-action="delete">Delete</button>
    <button class="menu-item" data-action="new-file">New File Here</button>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
